name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-test-lint:
    name: Build · Test · Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.102'

      - name: Restore
        run: dotnet restore backend/MAIHealthCoach.sln

      - name: Build (Release)
        run: dotnet build backend/MAIHealthCoach.sln -c Release --no-restore

      - name: Test (Release)
        run: dotnet test backend/MAIHealthCoach.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Publish test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./test-results/*.trx
          if-no-files-found: ignore

      - name: Lint (dotnet format)
        run: dotnet format backend/MAIHealthCoach.sln --verify-no-changes --no-restore

  image-build:
    name: Container image build
    runs-on: ubuntu-latest
    needs: build-test-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API container image
        run: docker build -f deploy/backend/Containerfile -t maihealthcoach-api:ci .
